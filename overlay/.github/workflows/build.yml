name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on any tag like v1.2.0
  workflow_dispatch:  # also lets you trigger manually from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Disable Windows Defender scanning on build paths
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:APPDATA\npm"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron"
          Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer + portable exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
